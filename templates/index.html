<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white p-4">
                    <h2 class="mb-0">📄 Create Your Resume</h2>
                </div>
                <div class="card-body p-4">
                    <form action="/generate" method="POST">
                        
                        <div class="mb-4">
                            <h5 class="text-secondary border-bottom pb-2">Personal Information</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h5 class="text-secondary border-bottom pb-2">Professional Details</h5>
                            <div class="mb-3">
                                <label class="form-label">Key Skills (comma separated)</label>
                                <textarea name="skills" class="form-control" rows="2" placeholder="Python, VS Code, Flask..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Experience Summary</label>
                                <textarea name="experience" class="form-control" rows="4" placeholder="Describe your previous roles..."></textarea>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Generate PDF Resume</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
